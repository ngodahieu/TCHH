<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng Tổng Hợp Phản Ứng Nhận Biết Hữu Cơ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at center,
    #0b1730 0%,
    #050d1a 50%,
    #000000 100%);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;

    text-shadow:
    0 0 10px #00d9ff,
    0 0 20px #00d9ff;
}

.control{
    max-width:1200px;
    margin:auto;
    margin-bottom:20px;
}

select{
    width:100%;
    padding:12px;

    border:none;
    border-radius:10px;

    background:#112244;
    color:white;
    font-size:16px;
}

.table-container{
    overflow-x:auto;
    max-width:1200px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
}

th{
    background:#00bcd4;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,.1);
}

tr:hover{
    background:rgba(255,255,255,.05);
}

.ok{
    color:#4caf50;
    font-weight:bold;
}

.no{
    color:#ff5252;
    font-weight:bold;
}

@media(max-width:768px){

    h1{
        font-size:22px;
    }

    th,td{
        padding:10px;
        font-size:13px;
    }
}

</style>
</head>
<body>

<h1>
BẢNG TỔNG HỢP PHẢN ỨNG NHẬN BIẾT HỮU CƠ
</h1>

<div class="control">

<select id="reagent">

<option value="Br2">Br₂</option>

<option value="AgNO3">
AgNO₃/NH₃
</option>

<option value="CuOH2">
Cu(OH)₂/OH⁻
</option>

<option value="NaHCO3">
NaHCO₃
</option>

<option value="Na">
Na
</option>

</select>

</div>

<div class="table-container">

<table>

<thead>

<tr>
<th>HCHC</th>
<th>Hiện tượng</th>
<th>Tên phản ứng</th>
<th>PTHH</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<script>

const data = {

Br2:{

"Anken":{
result:"Mất màu dung dịch brom",
reaction:"Phản ứng cộng brom",
equation:"CH2=CH2 + Br2 → CH2Br-CH2Br"
},

"Ankin":{
result:"Mất màu dung dịch brom",
reaction:"Phản ứng cộng brom",
equation:"HC≡CH + Br2 → CHBr=CHBr"
},

"Phenol":{
result:"Kết tủa trắng",
reaction:"Phản ứng thế brom",
equation:"C6H5OH + 3Br2 → C6H2Br3OH↓ + 3HBr"
},

"Anđehit":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
},

"Ancol":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
}

},

AgNO3:{

"Anken":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
},

"Ankin":{
result:"Kết tủa bạc axetylua",
reaction:"Phản ứng thế H linh động",
equation:"HC≡CH + 2AgNO3 + 2NH3 → AgC≡CAg↓"
},

"Phenol":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
},

"Anđehit":{
result:"Xuất hiện gương bạc",
reaction:"Phản ứng tráng bạc",
equation:"RCHO + 2[Ag(NH3)2]OH → RCOONH4 + 2Ag↓"
},

"Ancol":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
}

},

CuOH2:{

"Anken":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
},

"Ankin":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
},

"Phenol":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
},

"Anđehit":{
result:"Kết tủa đỏ gạch",
reaction:"Phản ứng oxi hóa",
equation:"RCHO + Cu(OH)2 → Cu2O↓"
},

"Ancol":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
}

},

NaHCO3:{

"Anken":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
},

"Axit cacboxylic":{
result:"Sủi bọt khí CO₂",
reaction:"Phản ứng axit-bazơ",
equation:"RCOOH + NaHCO3 → RCOONa + CO2↑ + H2O"
},

"Phenol":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
}

},

Na:{

"Ancol":{
result:"Thoát khí H₂",
reaction:"Phản ứng thế H của nhóm OH",
equation:"2ROH + 2Na → 2RONa + H2↑"
},

"Phenol":{
result:"Thoát khí H₂",
reaction:"Phản ứng thế H của nhóm OH",
equation:"2C6H5OH + 2Na → 2C6H5ONa + H2↑"
},

"Anken":{
result:"Không phản ứng",
reaction:"-",
equation:"-"
}

}

};

const reagentSelect =
document.getElementById("reagent");

const tableBody =
document.getElementById("tableBody");

function renderTable(){

const reagent =
reagentSelect.value;

const reactions =
data[reagent];

tableBody.innerHTML = "";

for(const compound in reactions){

const item =
reactions[compound];

const row =
document.createElement("tr");

const isNoReaction =
item.result === "Không phản ứng";

row.innerHTML = `
<td>${compound}</td>

<td class="${
isNoReaction ? "no" : "ok"
}">
${item.result}
</td>

<td>${item.reaction}</td>

<td>${item.equation}</td>
`;

tableBody.appendChild(row);

}

}

reagentSelect.addEventListener(
"change",
renderTable
);

renderTable();

</script>

</body>
</html>
```
