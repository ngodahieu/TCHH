<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng Tổng Hợp Phản Ứng Nhận Biết Hữu Cơ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at center,
    #0b1730 0%,
    #050d1a 50%,
    #000000 100%);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;

    text-shadow:
    0 0 10px #00d9ff,
    0 0 20px #00d9ff;
}

.control{
    max-width:1200px;
    margin:auto;
    margin-bottom:20px;
}

select{
    width:100%;
    padding:12px;

    border:none;
    border-radius:10px;

    background:#112244;
    color:white;
    font-size:16px;
}

.table-container{
    overflow-x:auto;
    max-width:1200px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
}

th{
    background:#00bcd4;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,.1);
}

tr:hover{
    background:rgba(255,255,255,.05);
}

.ok{
    color:#4caf50;
    font-weight:bold;
}

.no{
    color:#ff5252;
    font-weight:bold;
}

@media(max-width:768px){

    h1{
        font-size:22px;
    }

    th,td{
        padding:10px;
        font-size:13px;
    }
}

</style>
</head>
<body>

<h1>
BẢNG TỔNG HỢP PHẢN ỨNG NHẬN BIẾT HỮU CƠ
</h1>

<div class="control">
<select id="reagent">
    <option value="">-- Tất cả thuốc thử --</option>
</select>

<!-- THÊM CÁI NÀY -->
<select id="reactionSelect">
<option value="">-- Tất cả phản ứng --</option>
</select>
</div>

<div class="table-container">

<table>

<thead>

<tr>
<th>HCHC</th>
<th>Hiện tượng</th>
<th>Điều kiện</th>
<th>Tên phản ứng</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>
<script>
    let allData = [];
    let unsubscribe = null;
</script>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
onSnapshot,
getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBK7Z0a47xMnJe7uqcJkAm0EX27frDPTVM",
  authDomain: "ht-organic-reactions.firebaseapp.com",
  projectId: "ht-organic-reactions",
  storageBucket: "ht-organic-reactions.firebasestorage.app",
  messagingSenderId: "257709442129",
  appId: "1:257709442129:web:5b05eacb71be44e66aa470",
  measurementId: "G-KE1F0TEVF6"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
let selectedReagent = "";
let selectedReaction = "";
let allData = [];
let unsubscribe = null;
function loadFirestoreData() {

    if (unsubscribe) unsubscribe();

    let q = collection(db, "reactions");

    let constraints = [];

    if (selectedReagent) {
        constraints.push(where("reagent", "==", selectedReagent));
    }

    const finalQuery =
        constraints.length ? query(q, ...constraints) : q;

    unsubscribe = onSnapshot(finalQuery, (snapshot) => {

        allData = [];

        snapshot.forEach(doc => {
            allData.push(doc.data());
        });

        applyFilter(); // 👈 lọc JS
    });
}
function applyFilter() {

    let data = allData;

    if (selectedReaction) {
        data = data.filter(item =>
    (item.reactionName || "")
    .toLowerCase()
    .includes(selectedReaction.toLowerCase())
);
    }

    renderTable(data);
}
async function loadReagents(){

    const reagentSelect =
    document.getElementById("reagent");
    const tableBody = document.getElementById("tableBody");

    const snapshot =
    await getDocs(collection(db,"reagents"));

    reagentSelect.innerHTML = "";

    snapshot.forEach(docSnap => {

        const option = document.createElement("option");

        option.value = docSnap.data().name;
        option.textContent = docSnap.data().name;

        reagentSelect.appendChild(option);

    });

    loadFirestoreData();
}
async function loadReactionNames(){

    const select = document.getElementById("reactionSelect");

    select.innerHTML = `<option value="">-- Tất cả phản ứng --</option>`;

    const snapshot = await getDocs(collection(db,"reactions"));

    const set = new Set();

    snapshot.forEach(doc=>{
    set.add(doc.data().reactionName);
});

    set.forEach(name=>{
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
    });
}
function renderTable(data){

    tableBody.innerHTML = "";

    data.forEach(item => {

        const row = document.createElement("tr");

        const isNoReaction =
        item.phenomenon === "Không phản ứng";

        row.innerHTML = `
<td>${item.compound}</td>
<td class="${isNoReaction ? "no":"ok"}">${item.phenomenon}</td>
<td>${item.condition || ""}</td>
<td>${item.reactionName || ""}</td>
`;

        tableBody.appendChild(row);
    });
}
const reagentSelect =
document.getElementById("reagent");

const tableBody =
document.getElementById("tableBody");

reagentSelect.addEventListener(
    "change",
    loadFirestoreData
);
document
.getElementById("reactionSelect")
.addEventListener("change", loadFirestoreData);
const searchInput = document.getElementById("searchInput");

if(searchInput){
    searchInput.addEventListener("input", function(){

        const keyword = this.value.toLowerCase();

        const filtered = allData.filter(item =>
            (item.reactionName || "").toLowerCase().includes(keyword) ||
            (item.compound || "").toLowerCase().includes(keyword)
        );

        renderTable(filtered);
    });
}
loadReagents();
document.getElementById("reagent").addEventListener("change", (e) => {
    selectedReagent = e.target.value;
    loadFirestoreData();
});
document.getElementById("reactionSelect").addEventListener("change", (e) => {
    selectedReaction = e.target.value;
    applyFilter();
});
loadReactionNames();
</script>
</body>
</html>
