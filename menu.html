<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bảng Tổng Hợp Phản Ứng Nhận Biết Hữu Cơ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at center,
    #0b1730 0%,
    #050d1a 50%,
    #000000 100%);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:25px;

    text-shadow:
    0 0 10px #00d9ff,
    0 0 20px #00d9ff;
}

.control{
    max-width:1200px;
    margin:auto;
    margin-bottom:20px;
}

select{
    width:100%;
    padding:12px;

    border:none;
    border-radius:10px;

    background:#112244;
    color:white;
    font-size:16px;
}

.table-container{
    overflow-x:auto;
    max-width:1200px;
    margin:auto;
}

table{
    width:100%;
    border-collapse:collapse;
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(10px);
}

th{
    background:#00bcd4;
    color:white;
    padding:15px;
}

td{
    padding:15px;
    border-bottom:1px solid rgba(255,255,255,.1);
}

tr:hover{
    background:rgba(255,255,255,.05);
}

.ok{
    color:#4caf50;
    font-weight:bold;
}

.no{
    color:#ff5252;
    font-weight:bold;
}

@media(max-width:768px){

    h1{
        font-size:22px;
    }

    th,td{
        padding:10px;
        font-size:13px;
    }
}

</style>
</head>
<body>

<h1>
BẢNG TỔNG HỢP PHẢN ỨNG NHẬN BIẾT HỮU CƠ
</h1>

<div class="control">

<select id="reagent">
</select>
<div class="control">
<select id="reagent"></select>

<!-- THÊM CÁI NÀY -->
<select id="reactionNameSelect"></select>
</div>
</div>

<div class="table-container">

<table>

<thead>

<tr>
<th>HCHC</th>
<th>Hiện tượng</th>
<th>Điều kiện</th>
<th>Tên phản ứng</th>
</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>
<script>
    let allData = [];
</script>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
onSnapshot,
getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBK7Z0a47xMnJe7uqcJkAm0EX27frDPTVM",
  authDomain: "ht-organic-reactions.firebaseapp.com",
  projectId: "ht-organic-reactions",
  storageBucket: "ht-organic-reactions.firebasestorage.app",
  messagingSenderId: "257709442129",
  appId: "1:257709442129:web:5b05eacb71be44e66aa470",
  measurementId: "G-KE1F0TEVF6"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);
async function loadFirestoreData(){

    const reagent =
    document.getElementById("reagent").value;

    const q = query(
        collection(db,"reactions"),
        where("reagent","==",reagent)
    );

    onSnapshot(q, (snapshot) => {

        allData = [];

        snapshot.forEach(doc=>{
            allData.push(doc.data());
        });

        renderTable(allData);

    });
}
async function loadReagents(){

    const reagentSelect =
    document.getElementById("reagent");

    const snapshot =
    await getDocs(collection(db,"reagents"));

    reagentSelect.innerHTML = "";

    snapshot.forEach(docSnap => {

        const option = document.createElement("option");

        option.value = docSnap.data().name;
        option.textContent = docSnap.data().name;

        reagentSelect.appendChild(option);

    });

    loadFirestoreData();
}
async function loadReactionNames(){

    const select =
    document.getElementById("reactionNameSelect");

    select.innerHTML = "";

    const snapshot =
    await getDocs(collection(db,"reactionNames"));

    snapshot.forEach(docSnap => {

        const option = document.createElement("option");

        option.value = docSnap.data().name;
        option.textContent = docSnap.data().name;

        select.appendChild(option);
    });

}
function renderTable(data){

    tableBody.innerHTML = "";

    data.forEach(item => {

        const row = document.createElement("tr");

        const isNoReaction =
        item.phenomenon === "Không phản ứng";

        row.innerHTML = `
        <td>${item.compound}</td>
        <td class="${isNoReaction ? "no":"ok"}">${item.phenomenon}</td>
        <td>${item.reactionName}</td>
        <td>${item.condition || ""}</td>
        `;

        tableBody.appendChild(row);
    });
}
const reagentSelect =
document.getElementById("reagent");

const tableBody =
document.getElementById("tableBody");

reagentSelect.addEventListener(
    "change",
    loadFirestoreData
);
document.getElementById("searchInput")
.addEventListener("input", function(){

    const keyword = this.value.toLowerCase();

    const filtered = allData.filter(item =>
        (item.reactionName || "").toLowerCase().includes(keyword) ||
(item.compound || "").toLowerCase().includes(keyword)
    );

    renderTable(filtered);
});
loadReagents();
loadReactionNames();
</script>
</body>
</html>
