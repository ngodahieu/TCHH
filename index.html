<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BẢNG TỔNG HỢP PHẢN ỨNG NHẬN BIẾT HỮU CƠ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:
    radial-gradient(circle at center,
    #0b1730 0%,
    #050d1a 50%,
    #000000 100%);
    font-family:Arial, sans-serif;
}

/* Tiêu đề */

.title{
    position:absolute;
    top:8%;
    width:100%;
    text-align:center;
    color:white;
    font-size:42px;
    font-weight:bold;
    letter-spacing:3px;
    text-shadow:
    0 0 10px #00bfff,
    0 0 20px #00bfff,
    0 0 40px #00bfff;
    z-index:100;
}

/* Nút bắt đầu */

.start-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:25px 80px;
    font-size:32px;
    font-weight:bold;
    color:white;
    border:2px solid #00d9ff;
    border-radius:15px;
    background:rgba(0,217,255,0.15);
    backdrop-filter:blur(10px);
    cursor:pointer;
    transition:.4s;
    z-index:100;

    box-shadow:
    0 0 10px #00d9ff,
    0 0 25px #00d9ff,
    0 0 50px #00d9ff;
}

.start-btn:hover{
    transform:translate(-50%,-50%) scale(1.08);

    box-shadow:
    0 0 20px #00d9ff,
    0 0 60px #00d9ff,
    0 0 120px #00d9ff;
}

/* Công thức hóa học */

.molecule{
    position:absolute;
    color:rgba(255,255,255,.22);
    font-weight:bold;
    white-space:nowrap;
    animation:float linear infinite;
}

/* Phương trình */

.reaction{
    position:absolute;
    color:rgba(0,255,255,.08);
    font-size:22px;
    white-space:nowrap;
    animation:float linear infinite;
}

/* Hiệu ứng bay */

@keyframes float{
    from{
        transform:translateY(110vh);
    }
    to{
        transform:translateY(-200px);
    }
}

/* ========================= */
/* VÒNG BENZEN 3D */
/* ========================= */

.benzene-container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    perspective:1200px;
    z-index:5;
    pointer-events:none;
}

.benzene{
    width:500px;
    height:500px;
    position:relative;
    transform-style:preserve-3d;
    animation:spin 18s linear infinite;
}

@keyframes spin{
    0%{
        transform:rotateX(0deg) rotateY(0deg);
    }
    100%{
        transform:rotateX(360deg) rotateY(360deg);
    }
}

.atom{
    position:absolute;
    width:50px;
    height:50px;
    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-weight:bold;

    background:
    radial-gradient(circle,
    #6ef2ff,
    #0099ff);

    box-shadow:
    0 0 10px #00d9ff,
    0 0 25px #00d9ff,
    0 0 50px #00d9ff;
}

.bond{
    position:absolute;
    height:4px;
    background:#00d9ff;
    transform-origin:left center;

    box-shadow:
    0 0 10px #00d9ff,
    0 0 20px #00d9ff;
}
/* Electron */

.electron{
    position:absolute;
    width:16px;
    height:16px;
    border-radius:50%;

    background:
radial-gradient(circle,
#ffffff,
#00ffff);

    box-shadow:
        0 0 10px #ffffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;

    z-index:20;
}

/* Quỹ đạo electron */

.orbit{
    position:absolute;
    width:340px;
    height:340px;

    left:80px;
    top:80px;

    border-radius:50%;

    animation:orbit 6s linear infinite;

    transform-style:preserve-3d;
}

@keyframes orbit{
    from{
        transform:rotateZ(0deg);
    }
    to{
        transform:rotateZ(360deg);
    }
}
.pi-cloud{
    position:absolute;

    width:320px;
    height:320px;

    left:90px;
    top:90px;

    border-radius:50%;

    border:2px dashed rgba(0,255,255,.2);

    box-shadow:
    0 0 20px rgba(0,255,255,.4);

    animation:
        pulse 3s infinite alternate;
}

@keyframes pulse{

    from{
        transform:scale(1);
        opacity:.4;
    }

    to{
        transform:scale(1.08);
        opacity:.9;
    }
}
/* ánh sáng nền */

.glow{
    position:absolute;
    top:50%;
    left:50%;
    width:600px;
    height:600px;
    transform:translate(-50%,-50%);
    border-radius:50%;

    background:
    radial-gradient(circle,
    rgba(0,217,255,.15),
    transparent 70%);

    filter:blur(10px);
    z-index:1;
}
@media(max-width:768px){

    .benzene{
        width:300px;
        height:300px;
    }

    .title{
        font-size:24px;
        padding:0 15px;
    }

    .start-btn{
        font-size:22px;
        padding:18px 50px;
    }

}
</style>
</head>

<body>

<div class="glow"></div>

<div class="title">
BẢNG TỔNG HỢP PHẢN ỨNG NHẬN BIẾT HỮU CƠ
</div>

<div class="benzene-container">
    <div class="benzene" id="benzene"></div>
</div>

<button class="start-btn">
BẮT ĐẦU
</button>

<script>

/* ========================= */
/* BENZENE 3D */
/* ========================= */

const benzene = document.getElementById("benzene");

const radius = 170;

const points = [];

for(let i=0;i<6;i++){

    const angle = i*Math.PI/3;

    const x = 250 + radius*Math.cos(angle);
    const y = 250 + radius*Math.sin(angle);

    points.push({x,y});

    const atom = document.createElement("div");
    atom.className = "atom";

    atom.innerHTML = "C";

    atom.style.left = (x-25)+"px";
    atom.style.top  = (y-25)+"px";

    benzene.appendChild(atom);
}

/* liên kết */

for(let i=0;i<6;i++){

    const p1 = points[i];
    const p2 = points[(i+1)%6];

    const dx = p2.x-p1.x;
    const dy = p2.y-p1.y;

    const length = Math.sqrt(dx*dx+dy*dy);

    const angle = Math.atan2(dy,dx)*180/Math.PI;

    const bond = document.createElement("div");
    bond.className = "bond";

    bond.style.width = length+"px";
    bond.style.left = p1.x+"px";
    bond.style.top  = p1.y+"px";

    bond.style.transform =
    `rotate(${angle}deg)`;

    benzene.appendChild(bond);
}
/* ========================= */
/* ELECTRON CHẠY QUANH VÒNG */
/* ========================= */

for(let i=0;i<6;i++){

    const orbit = document.createElement("div");
    orbit.className = "orbit";

    orbit.style.animationDelay =
        -(i*1)+"s";

    const electron =
        document.createElement("div");

    electron.className = "electron";

    electron.style.left = "334px";
    electron.style.top = "164px";

    orbit.appendChild(electron);

    benzene.appendChild(orbit);
}
const cloud =
document.createElement("div");

cloud.className = "pi-cloud";

benzene.appendChild(cloud);
/* ========================= */
/* PHẢN ỨNG HÓA HỌC */
/* ========================= */

const formulas = [

"CH₄",
"C₂H₂",
"C₂H₄",
"C₂H₅OH",
"CH₃COOH",
"HCHO",
"CH₃CHO",
"C₆H₆",
"Phenol",
"Ester",
"Alcohol",
"Amine",
"ketone",
"CHO",
"COOH",
"OH",
"NH₂"

];

const reactions = [

"C₂H₄ + Br₂ → mất màu",
"RCHO + AgNO₃/NH₃ → Ag↓",
"RCHO + Cu(OH)₂ → Cu₂O↓",
"C₂H₅OH + Na → H₂↑",
"CH₃COOH + NaHCO₃ → CO₂↑",
"C₆H₅OH + Br₂ → kết tủa trắng",
"Protein + Cu(OH)₂ → màu tím",
"Glucose + AgNO₃ → Ag↓",
"Ester + NaOH → muối + alcohol"

];

function createFormula(){

    const el = document.createElement("div");

    el.className = "molecule";

    el.innerHTML =
    formulas[Math.floor(Math.random()*formulas.length)];

    el.style.left =
    Math.random()*100+"vw";

    el.style.fontSize =
    18 + Math.random()*30+"px";

    el.style.animationDuration =
    10 + Math.random()*15+"s";

    document.body.appendChild(el);

    setTimeout(()=>{
        el.remove();
    },25000);
}

function createReaction(){

    const el = document.createElement("div");

    el.className = "reaction";

    el.innerHTML =
    reactions[Math.floor(Math.random()*reactions.length)];

    el.style.left =
    Math.random()*80+"vw";

    el.style.animationDuration =
    20 + Math.random()*15+"s";

    document.body.appendChild(el);

    setTimeout(()=>{
        el.remove();
    },35000);
}

setInterval(createFormula,800);
setInterval(createReaction,1200);

for(let i=0;i<12;i++) createFormula();
for(let i=0;i<10;i++) createReaction();

</script>

</body>
</html>
```
