<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

body{
    font-family:Arial;
    background:#0b1730;
    color:white;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#00bcd4;
    color:white;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
}

td,th{
    border:1px solid #333;
    padding:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>Quản lý phản ứng hữu cơ</h1>

<h3>Quản lý HCHC</h3>

<input
id="newCompound"
placeholder="Tên HCHC">

<button onclick="addCompound()">
Thêm HCHC
</button>
<table>
<thead>
<tr>
<th>Danh sách HCHC</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="compoundList">
</tbody>
</table>
<h3>Quản lý thuốc thử</h3>

<input
id="newReagent"
placeholder="Tên thuốc thử">

<button onclick="addReagent()">
Thêm thuốc thử
</button>
<table>
<thead>
<tr>
<th>Danh sách thuốc thử</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="reagentList">
</tbody>
</table>
<h3>Quản lý tên phản ứng</h3>

<input
id="newReactionType"
placeholder="Tên phản ứng">

<button onclick="addReactionType()">
Thêm tên phản ứng
</button>

<table>
<thead>
<tr>
<th>Danh sách tên phản ứng</th>
<th>Xóa</th>
</tr>
</thead>

<tbody id="reactionTypeList">
</tbody>
</table>
<hr>

<select id="compound"></select>

<select id="reagent"></select>
<select id="reactionName"></select>
<input id="phenomenon" placeholder="Hiện tượng">
<input id="condition" placeholder="Điều kiện phản ứng">


<button onclick="addReaction()">
Thêm phản ứng
</button>
<button
id="updateBtn"
onclick="updateReaction()"
style="display:none;background:#4caf50;">
Cập nhật
</button>
<button
onclick="fixReactionData()"
style="background:#ff9800;">
Sửa dữ liệu bị đảo
</button>
<table>

<thead>

<tr>
<th>HCHC</th>
<th>Thuốc thử</th>
<th>Hiện tượng</th>
<th>Điều kiện</th>
<th>Tên phản ứng</th>
<th>Sửa</th>
<th>Xóa</th>
</tr>

</thead>

<tbody id="list">

</tbody>

</table>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
getDoc,
updateDoc,
writeBatch
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBK7Z0a47xMnJe7uqcJkAm0EX27frDPTVM",
  authDomain: "ht-organic-reactions.firebaseapp.com",
  projectId: "ht-organic-reactions",
  storageBucket: "ht-organic-reactions.firebasestorage.app",
  messagingSenderId: "257709442129",
  appId: "1:257709442129:web:5b05eacb71be44e66aa470",
};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);
window.addCompound =
async function(){

    const name =
    document.getElementById(
    "newCompound"
    ).value;

    if(!name) return;

    await addDoc(
    collection(db,"compounds"),
    {
        name:name
    }
    );

    document.getElementById(
    "newCompound"
    ).value = "";

    loadCompounds();
loadCompoundTable();

}
window.addReagent =
async function(){

    const name =
    document.getElementById(
    "newReagent"
    ).value;

    if(!name) return;

    await addDoc(
    collection(db,"reagents"),
    {
        name:name
    }
    );

    document.getElementById(
    "newReagent"
    ).value = "";

    loadReagents();
loadReagentTable();

}
window.addReactionType =
async function(){

    const name =
    document.getElementById("newReactionType").value;

    if(!name) return;

    await addDoc(
        collection(db,"reactionTypes"),
        {
            name:name
        }
    );

    document.getElementById("newReactionType").value = "";

    loadReactionTypeTable();
    loadReactionTypes();
}
async function loadCompounds(){

    const select =
    document.getElementById(
    "compound"
    );

    select.innerHTML = "";

    const snapshot =
    await getDocs(
    collection(db,"compounds")
    );

    snapshot.forEach(docSnap=>{

        const option =
        document.createElement(
        "option"
        );

        option.value =
        docSnap.data().name;

        option.textContent =
        docSnap.data().name;

        select.appendChild(
        option
        );

    });

}
async function loadCompoundTable(){

    const snapshot =
    await getDocs(
    collection(db,"compounds")
    );

    const list =
    document.getElementById(
    "compoundList"
    );

    list.innerHTML = "";

    snapshot.forEach(docSnap=>{

        list.innerHTML += `
<tr>
<td>${docSnap.data().name}</td>

<td>
<button onclick="deleteCompound('${docSnap.id}')">
Xóa
</button>
</td>
</tr>
`;

    });

}
window.deleteCompound = async function(id){

    if(!confirm("Xóa HCHC này?"))
        return;

    await deleteDoc(
        doc(db,"compounds",id)
    );

    loadCompounds();
    loadCompoundTable();
}
async function loadReagents(){

    const select =
    document.getElementById(
    "reagent"
    );

    select.innerHTML = "";

    const snapshot =
    await getDocs(
    collection(db,"reagents")
    );

    snapshot.forEach(docSnap=>{

        const option =
        document.createElement(
        "option"
        );

        option.value =
        docSnap.data().name;

        option.textContent =
        docSnap.data().name;

        select.appendChild(
        option
        );

    });

}
async function loadReactionTypes(){

    const select =
    document.getElementById("reactionName");

    select.innerHTML = "";

    const snapshot =
    await getDocs(
        collection(db,"reactionTypes")
    );

    snapshot.forEach(docSnap=>{

        const option =
        document.createElement("option");

        option.value =
        docSnap.data().name;

        option.textContent =
        docSnap.data().name;

        select.appendChild(option);

    });
}
async function loadReagentTable(){

    const snapshot =
    await getDocs(
    collection(db,"reagents")
    );

    const list =
    document.getElementById(
    "reagentList"
    );

    list.innerHTML = "";

    snapshot.forEach(docSnap=>{

        list.innerHTML += `
<tr>
<td>${docSnap.data().name}</td>

<td>
<button onclick="deleteReagent('${docSnap.id}')">
Xóa
</button>
</td>
</tr>
`;

    });

}
async function loadReactionTypeTable(){

    const snapshot =
    await getDocs(
        collection(db,"reactionTypes")
    );

    const list =
    document.getElementById("reactionTypeList");

    list.innerHTML = "";

    snapshot.forEach(docSnap=>{

        list.innerHTML += `
        <tr>
        <td>${docSnap.data().name}</td>

        <td>
        <button onclick="deleteReactionType('${docSnap.id}')">
        Xóa
        </button>
        </td>

        </tr>
        `;
    });
}
window.deleteReagent = async function(id){

    if(!confirm("Xóa thuốc thử này?"))
        return;

    await deleteDoc(
        doc(db,"reagents",id)
    );

    loadReagents();
    loadReagentTable();
}
window.deleteReactionType =
async function(id){

    if(!confirm("Xóa tên phản ứng này?"))
        return;

    await deleteDoc(
        doc(db,"reactionTypes",id)
    );

    loadReactionTypeTable();
loadReactionTypes();
}
let editingId = null;
window.addReaction = async function(){

try{

    await addDoc(
    collection(db,"reactions"),
    {
        compound:
        document.getElementById("compound").value,

        reagent:
        document.getElementById("reagent").value,

        phenomenon:
        document.getElementById("phenomenon").value,

        reactionName:
        document.getElementById("reactionName").value,
            
        condition: 
        document.getElementById("condition").value
    }
    );
const reagentName =
document.getElementById("reagent").value;

const reagentSnapshot =
await getDocs(
collection(db,"reagents")
);

let exists = false;

reagentSnapshot.forEach(doc=>{

    if(doc.data().name === reagentName){

        exists = true;

    }

});

if(!exists){

    await addDoc(
    collection(db,"reagents"),
    {
        name: reagentName
    }
    );

}
    alert("Đã thêm thành công");
document.getElementById("compound").value = "";
document.getElementById("reagent").value = "";
document.getElementById("phenomenon").value = "";
document.getElementById("reactionName").value = "";
document.getElementById("condition").value = "";
    loadData();

}catch(error){

    console.error(error);

    alert("Lỗi: " + error.message);

}

}
async function loadData(){

const snapshot =
await getDocs(
collection(db,"reactions")
);

const list =
document.getElementById("list");

list.innerHTML="";

snapshot.forEach(docSnap=>{

const item = docSnap.data();

list.innerHTML += `
<tr>

<td>${item.compound || ""}</td>

<td>${item.reagent || ""}</td>

<td>${item.phenomenon || ""}</td>

<td>${item.condition || ""}</td>

<td>${item.reactionName || ""}</td>
<td>
<button onclick="editReaction('${docSnap.id}')">
Sửa
</button>
</td>

<td>
<button onclick="deleteReaction('${docSnap.id}')">
Xóa
</button>
</td>

</tr>
`;

});

}
window.deleteReaction =
async function(id){

if(!confirm("Xóa?"))
return;

await deleteDoc(
doc(db,"reactions",id)
);

loadData();

}
window.editReaction = async function(id){

const snap =
await getDoc(
doc(db,"reactions",id)
);

const item = snap.data();

editingId = id;

document.getElementById("compound").value =
item.compound || "";

document.getElementById("reagent").value =
item.reagent || "";

document.getElementById("phenomenon").value =
item.phenomenon || "";

document.getElementById("reactionName").value =
item.reactionName || "";

document.getElementById("condition").value =
item.condition || "";
    
document.getElementById("updateBtn").style.display =
"inline-block";

}
window.updateReaction =
async function(){

if(!editingId) return;

await updateDoc(
doc(db,"reactions",editingId),
{
compound:
document.getElementById("compound").value,

reagent:
document.getElementById("reagent").value,

phenomenon:
document.getElementById("phenomenon").value,

reactionName:
document.getElementById("reactionName").value,

condition: 
document.getElementById("condition").value
}
);

alert("Đã cập nhật");

editingId = null;

document.getElementById("updateBtn").style.display =
"none";

loadData();

}
window.fixReactionData = async function(){

    if(!confirm("Đảo toàn bộ Điều kiện và Tên phản ứng?"))
        return;

    const snapshot =
    await getDocs(
        collection(db,"reactions")
    );

    const batch = writeBatch(db);

    snapshot.forEach(docSnap=>{

        const item = docSnap.data();

        batch.update(
            doc(db,"reactions",docSnap.id),
            {
                reactionName: item.condition || "",
                condition: item.reactionName || ""
            }
        );

    });

    await batch.commit();

    alert("Đã sửa toàn bộ dữ liệu");

    loadData();
}
loadCompounds();
loadReagents();
loadReactionTypes();

loadCompoundTable();
loadReagentTable();
loadReactionTypeTable();

loadData();
</script>
</body>
</html>
